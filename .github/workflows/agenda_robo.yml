name: Executar o Monitor de Protocolos

on:
  workflow_dispatch:
  schedule:
    # 15:00 UTC = 12:00 Horário de Brasília (Segunda a Sexta)
    - cron: '0 15 * * 1-5'

jobs:
  run-box:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v3

      - name: Configurar o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias do Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar o Monitor de Protocolos
        env:
          USER_PORTAL: ${{ secrets.USER_PORTAL }}
          SENHA_PORTAL: ${{ secrets.SENHA_PORTAL }}
          SENHA_GMAIL: ${{ secrets.SENHA_GMAIL }}
        run: python monitor.py

      - name: Salvar alteracoes na planilha no GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add monitor_protocolos.xlsx
          git commit -m "🤖 [Robô] Status atualizado automaticamente" || echo "Nenhuma alteracao pendente"
          git push
