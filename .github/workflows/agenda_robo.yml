name: Executar o Monitor de Protocolos

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11,21 * * *' # Roda às 08h e 18h (Horário de Brasília)

jobs:
  run-box:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias e navegador
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Executar o Monitor de Protocolos
        env:
          USER_PORTAL: ${{ secrets.USER_PORTAL }}
          SENHA_PORTAL: ${{ secrets.SENHA_PORTAL }}
          SENHA_GMAIL: ${{ secrets.SENHA_GMAIL }}
        run: python monitor.py

      - name: Salvar alteracoes na planilha no GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add monitor_protocolos.html
          git commit -m "[Robô] Status atualizado automaticamente" || echo "Nenhuma alteracao pendente"
          git push
