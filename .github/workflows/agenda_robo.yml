name: Executar Robo Diario

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar codigo do repositorio
      uses: actions/checkout@v3

    - name: Configurar o Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar Google Chrome e Driver na Nuvem
      run: |
        sudo apt-get update
        sudo apt-get install -y wget curl unzip libxi6 libgconf-2-4 libnss3 xdg-utils
        wget https://storage.googleapis.com/chrome-for-testing-public/125.0.6422.141/linux64/chrome-linux64.zip
        unzip chrome-linux64.zip
        sudo mv chrome-linux64 /opt/google-chrome
        sudo ln -s /opt/google-chrome/chrome /usr/bin/google-chrome
        
    - name: Instalar dependencias do Python
      run: |
        pip install -r requirements.txt

    - name: Executar o Monitor de Protocolos
      run: python monitor.py
